services:
  github-runner:
    image: juliansantosinfo/github-runner:${RUNNER_VERSION:-latest}
    env_file:
      - .env
    # environment:
    #   - GITHUB_PAT=${GITHUB_PAT:-}
    #   - GITHUB_REPO_OWNER=${GITHUB_REPO_OWNER:-}
    #   - GITHUB_REPO_NAME=${GITHUB_REPO_NAME:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - github-runner-data:/actions-runner/_work
    restart: always

volumes:
  github-runner-data:
